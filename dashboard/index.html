<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestro Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --green: #3fb950;
      --red: #f85149; --yellow: #d29922; --purple: #bc8cff; --orange: #f0883e;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .app { max-width: 1400px; margin: 0 auto; padding: 20px; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    header h1 { font-size: 20px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .connection { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.connected { background: var(--green); }
    .dot.disconnected { background: var(--red); }

    .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; min-width: 140px; }
    .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red { color: var(--red); }
    .stat-value.accent { color: var(--accent); }

    .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border-radius: 8px; padding: 3px; }
    .tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--surface2); color: var(--text); }

    .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .column { background: var(--surface); border-radius: 10px; padding: 16px; min-height: 200px; }
    .column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .column-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
    .column-count { background: var(--surface2); color: var(--text2); font-size: 11px; padding: 2px 8px; border-radius: 10px; }

    .card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card-id { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .badge.priority-1 { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge.priority-2 { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge.priority-3 { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge.priority-4 { background: rgba(139,148,158,0.15); color: var(--text2); }
    .badge.label { background: rgba(188,140,255,0.15); color: var(--purple); }
    .badge.running { background: rgba(210,153,34,0.2); color: var(--yellow); animation: pulse 2s infinite; }
    .badge.retrying { background: rgba(240,136,62,0.15); color: var(--orange); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn { border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #79c0ff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text2); }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-refresh { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
    .btn-refresh:hover { border-color: var(--accent); }

    .dropdown { position: relative; display: inline-block; }
    .dropdown-menu { position: absolute; top: 100%; left: 0; z-index: 10; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; min-width: 150px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .dropdown-item { display: block; width: 100%; padding: 6px 10px; border: none; background: none; color: var(--text); font-size: 12px; text-align: left; cursor: pointer; border-radius: 4px; }
    .dropdown-item:hover { background: var(--surface2); }

    .workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
    .worker-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .worker-card.active { border-color: var(--yellow); }
    .worker-card.retry { border-color: var(--orange); }
    .worker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .worker-id { font-size: 14px; font-weight: 600; color: var(--accent); }
    .worker-detail { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .worker-detail strong { color: var(--text); }
    .worker-event { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: 6px; font-size: 11px; color: var(--text2); font-family: 'SF Mono', Monaco, monospace; max-height: 80px; overflow: hidden; text-overflow: ellipsis; }

    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 600px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .detail-panel h2 { font-size: 16px; margin-bottom: 4px; }
    .detail-panel .meta { color: var(--text2); font-size: 13px; margin-bottom: 16px; }
    .detail-panel .desc { font-size: 13px; line-height: 1.6; color: var(--text); background: var(--bg); padding: 12px; border-radius: 6px; white-space: pre-wrap; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
    .detail-panel .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .empty { text-align: center; color: var(--text2); padding: 40px; font-size: 13px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.origin;
const STATES = ['Backlog', 'Todo', 'In Progress', 'Done'];
const PRIORITY_LABELS = { 1: 'Urgent', 2: 'High', 3: 'Medium', 4: 'Low' };

function useWebSocket() {
  const [connected, setConnected] = useState(false);
  const listeners = useRef([]);
  const ws = useRef(null);

  useEffect(() => {
    function connect() {
      const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const socket = new WebSocket(`${proto}://${window.location.host}/api/ws`);
      socket.onopen = () => setConnected(true);
      socket.onclose = () => { setConnected(false); setTimeout(connect, 3000); };
      socket.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          listeners.current.forEach(fn => fn(data));
        } catch {}
      };
      ws.current = socket;
    }
    connect();
    return () => ws.current?.close();
  }, []);

  const subscribe = useCallback((fn) => {
    listeners.current.push(fn);
    return () => { listeners.current = listeners.current.filter(f => f !== fn); };
  }, []);

  return { connected, subscribe };
}

function App() {
  const [tab, setTab] = useState('board');
  const [issues, setIssues] = useState([]);
  const [orchState, setOrchState] = useState(null);
  const [selectedIssue, setSelectedIssue] = useState(null);
  const [loading, setLoading] = useState(true);
  const { connected, subscribe } = useWebSocket();

  const fetchIssues = async () => {
    try {
      const res = await fetch(`${API}/api/issues/all`);
      if (res.ok) setIssues(await res.json());
    } catch {}
  };

  const fetchOrchState = async () => {
    try {
      const res = await fetch(`${API}/api/v1/orchestrator`);
      if (res.ok) setOrchState(await res.json());
    } catch {}
  };

  useEffect(() => {
    Promise.all([fetchIssues(), fetchOrchState()]).then(() => setLoading(false));
    const interval = setInterval(() => { fetchIssues(); fetchOrchState(); }, 10000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    return subscribe((event) => {
      if (event.type === 'state_update') {
        setOrchState(prev => ({ ...prev, ...event.state }));
      }
      if (event.type === 'run_updated' && event.run?.status === 'completed') {
        setTimeout(fetchIssues, 1000);
      }
    });
  }, [subscribe]);

  const changeState = async (issueRef, stateName) => {
    await fetch(`${API}/api/issues/${issueRef}/state`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state_name: stateName }),
    });
    fetchIssues();
  };

  const triggerRun = async (issueId) => {
    await fetch(`${API}/api/runs`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ issue_id: issueId }),
    });
    setTimeout(fetchOrchState, 500);
  };

  const triggerRefresh = async () => {
    await fetch(`${API}/api/v1/refresh`, { method: 'POST' });
    setTimeout(() => { fetchIssues(); fetchOrchState(); }, 2000);
  };

  const runningMap = {};
  const retryingMap = {};
  if (orchState) {
    (orchState.running || []).forEach(r => { runningMap[r.issue_identifier] = r; });
    (orchState.retrying || []).forEach(r => { retryingMap[r.issue_identifier] = r; });
  }

  if (loading) return <div className="app"><div className="empty">Loading...</div></div>;

  return (
    <div className="app">
      <header>
        <h1><span>Maestro</span> Dashboard</h1>
        <div className="header-right">
          <button className="btn btn-refresh" onClick={triggerRefresh}>Refresh Poll</button>
          <div className="connection">
            <div className={`dot ${connected ? 'connected' : 'disconnected'}`} />
            {connected ? 'Connected' : 'Reconnecting...'}
          </div>
        </div>
      </header>

      {orchState && <StatsBar state={orchState} issueCount={issues.length} />}

      <div className="tabs">
        <button className={`tab ${tab === 'board' ? 'active' : ''}`} onClick={() => setTab('board')}>
          Board
        </button>
        <button className={`tab ${tab === 'workers' ? 'active' : ''}`} onClick={() => setTab('workers')}>
          Workers ({orchState?.counts?.running || 0})
        </button>
      </div>

      {tab === 'board' && (
        <Board
          issues={issues}
          runningMap={runningMap}
          retryingMap={retryingMap}
          onChangeState={changeState}
          onTrigger={triggerRun}
          onSelect={setSelectedIssue}
        />
      )}
      {tab === 'workers' && <WorkersPanel state={orchState} />}

      {selectedIssue && (
        <IssueDetail
          issue={selectedIssue}
          running={runningMap[selectedIssue.identifier]}
          onClose={() => setSelectedIssue(null)}
          onChangeState={changeState}
          onTrigger={triggerRun}
        />
      )}
    </div>
  );
}

function StatsBar({ state, issueCount }) {
  const running = state.counts?.running || 0;
  const retrying = state.counts?.retrying || 0;
  const seconds = state.totals?.seconds_running || 0;
  const minutes = Math.round(seconds / 60);
  return (
    <div className="stats-bar">
      <div className="stat-card">
        <div className="stat-label">Issues</div>
        <div className="stat-value accent">{issueCount}</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">Running</div>
        <div className={`stat-value ${running > 0 ? 'yellow' : ''}`}>{running}</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">Retrying</div>
        <div className={`stat-value ${retrying > 0 ? 'red' : ''}`}>{retrying}</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">Agent Time</div>
        <div className="stat-value green">{minutes}m</div>
      </div>
    </div>
  );
}

function Board({ issues, runningMap, retryingMap, onChangeState, onTrigger, onSelect }) {
  return (
    <div className="kanban">
      {STATES.map(state => {
        const items = issues.filter(i => i.state === state);
        return (
          <div className="column" key={state}>
            <div className="column-header">
              <span className="column-title">{state}</span>
              <span className="column-count">{items.length}</span>
            </div>
            {items.map(issue => (
              <IssueCard
                key={issue.id}
                issue={issue}
                isRunning={!!runningMap[issue.identifier]}
                isRetrying={!!retryingMap[issue.identifier]}
                runInfo={runningMap[issue.identifier]}
                onChangeState={onChangeState}
                onTrigger={onTrigger}
                onSelect={onSelect}
              />
            ))}
            {items.length === 0 && <div className="empty" style={{padding:'20px'}}>No issues</div>}
          </div>
        );
      })}
    </div>
  );
}

function IssueCard({ issue, isRunning, isRetrying, runInfo, onChangeState, onTrigger, onSelect }) {
  const [menuOpen, setMenuOpen] = useState(false);

  return (
    <div className="card" onClick={() => onSelect(issue)}>
      <div className="card-id">{issue.identifier}</div>
      <div className="card-title">{issue.title}</div>
      <div className="card-meta">
        {issue.priority && <span className={`badge priority-${issue.priority}`}>{PRIORITY_LABELS[issue.priority] || `P${issue.priority}`}</span>}
        {(issue.labels || []).map(l => <span key={l} className="badge label">{l}</span>)}
        {isRunning && <span className="badge running">Running{runInfo?.turn_count ? ` T${runInfo.turn_count}` : ''}</span>}
        {isRetrying && !isRunning && <span className="badge retrying">Retrying</span>}
      </div>
      {runInfo?.last_message && (
        <div className="worker-event" style={{marginTop:8}}>{runInfo.last_message}</div>
      )}
      <div className="card-actions" onClick={e => e.stopPropagation()}>
        {issue.state !== 'Done' && (
          <button className="btn btn-primary btn-sm" disabled={isRunning} onClick={() => onTrigger(issue.identifier)}>
            {isRunning ? 'Running...' : 'Run'}
          </button>
        )}
        <div className="dropdown">
          <button className="btn btn-secondary btn-sm" onClick={() => setMenuOpen(!menuOpen)}>Move</button>
          {menuOpen && (
            <div className="dropdown-menu">
              {STATES.filter(s => s !== issue.state).map(s => (
                <button key={s} className="dropdown-item" onClick={() => { onChangeState(issue.identifier, s); setMenuOpen(false); }}>
                  {s}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function WorkersPanel({ state }) {
  const running = state?.running || [];
  const retrying = state?.retrying || [];

  if (!running.length && !retrying.length) {
    return <div className="empty">No active workers</div>;
  }

  return (
    <div className="workers-grid">
      {running.map(w => (
        <div className="worker-card active" key={w.issue_id}>
          <div className="worker-header">
            <span className="worker-id">{w.issue_identifier}</span>
            <span className="badge running">Running</span>
          </div>
          <div className="worker-detail">
            <div>State: <strong>{w.state}</strong></div>
            <div>Turns: <strong>{w.turn_count}</strong></div>
            {w.session_id && <div>Session: <strong>{w.session_id.slice(0, 8)}...</strong></div>}
            {w.last_event && <div>Event: <strong>{w.last_event}</strong></div>}
            {w.started_at && <div>Started: <strong>{new Date(w.started_at).toLocaleTimeString()}</strong></div>}
          </div>
          {w.last_message && <div className="worker-event">{w.last_message}</div>}
        </div>
      ))}
      {retrying.map(r => (
        <div className="worker-card retry" key={r.issue_id}>
          <div className="worker-header">
            <span className="worker-id">{r.issue_identifier}</span>
            <span className="badge retrying">Retry #{r.attempt}</span>
          </div>
          <div className="worker-detail">
            {r.error && <div>Error: <strong>{r.error.slice(0, 120)}</strong></div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function IssueDetail({ issue, running, onClose, onChangeState, onTrigger }) {
  return (
    <div className="detail-overlay" onClick={onClose}>
      <div className="detail-panel" onClick={e => e.stopPropagation()}>
        <div className="card-id" style={{marginBottom: 4}}>{issue.identifier}</div>
        <h2>{issue.title}</h2>
        <div className="meta">
          State: <strong>{issue.state}</strong>
          {issue.url && <> &middot; <a href={issue.url} target="_blank" rel="noreferrer" style={{color: 'var(--accent)'}}>Open in Linear</a></>}
        </div>
        {issue.description && <div className="desc">{issue.description}</div>}

        {running && (
          <div style={{marginBottom:16}}>
            <div className="column-title" style={{marginBottom:8}}>Active Worker</div>
            <div className="worker-card active" style={{border:'none',padding:12}}>
              <div className="worker-detail">
                <div>Session: <strong>{running.session_id?.slice(0,8) || '—'}...</strong></div>
                <div>Turns: <strong>{running.turn_count}</strong> &middot; Event: <strong>{running.last_event || '—'}</strong></div>
              </div>
              {running.last_message && <div className="worker-event">{running.last_message}</div>}
            </div>
          </div>
        )}

        <div className="actions">
          {issue.state !== 'Done' && (
            <button className="btn btn-primary" disabled={!!running} onClick={() => onTrigger(issue.identifier)}>
              {running ? 'Running...' : 'Run with Maestro'}
            </button>
          )}
          {STATES.filter(s => s !== issue.state).map(s => (
            <button key={s} className="btn btn-secondary" onClick={() => { onChangeState(issue.identifier, s); onClose(); }}>
              &rarr; {s}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
